# SPDX-License-Identifier: Apache-2.0
# =============================================================================
# Countly Helm Chart - Default Values
# =============================================================================
# Focus: product analytics with MongoDB, event tracking, and plugin system

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

# =============================================================================
# Image
# =============================================================================

image:
  # -- Countly container image
  repository: docker.io/countly/countly-server
  # -- Image tag
  tag: "25.05.4"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# Countly Configuration
# =============================================================================

countly:
  # -- API port (internal)
  apiPort: 3001
  # -- Dashboard/frontend port (internal)
  dashboardPort: 6001
  # -- Number of API worker processes
  apiWorkers: 4
  # -- Timezone
  timezone: UTC
  # -- Plugins to enable (comma-separated list or leave empty for defaults)
  plugins: ""
  # -- Extra environment variables for the container
  # -- @default -- `[]`
  extraEnv: []

# =============================================================================
# MongoDB Connection
# =============================================================================

externalMongodb:
  # -- Use external MongoDB instead of subchart
  enabled: false
  # -- MongoDB connection URI (when using external MongoDB)
  uri: ""
  # -- Existing secret with MongoDB URI
  existingSecret: ""
  # -- Key in existing secret for MongoDB URI
  existingSecretUriKey: mongodb-uri

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: false
  # -- ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

# =============================================================================
# Service
# =============================================================================

service:
  # -- Service type
  type: ClusterIP
  # -- Dashboard service port
  port: 80
  # -- API service port
  apiPort: 3001
  # -- Annotations for the Service
  annotations: {}
  # -- Set the ipFamilyPolicy for dual-stack (GR-058)
  ipFamilyPolicy: ''
  # -- Set the ipFamilies for dual-stack
  ipFamilies: []

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for Countly
  enabled: false
  # -- Ingress class name (for example: traefik, nginx)
  ingressClassName: traefik
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt
  # -- Ingress hosts
  hosts: []
    # - host: countly.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  # -- Ingress TLS configuration
  tls: []
    # - hosts:
    #     - countly.example.com
    #   secretName: countly-tls

# =============================================================================
# Probes
# =============================================================================

probes:
  startup:
    enabled: true
    initialDelaySeconds: 20
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
  liveness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Resources and Security
# =============================================================================

resources: {}

podSecurityContext: {}

securityContext: {}

# =============================================================================
# S3 Backup
# =============================================================================

backup:
  # -- Enable scheduled MongoDB backups to S3-compatible storage
  enabled: false
  # -- Cron schedule for backups (default: daily at 03:00 UTC)
  schedule: "0 3 * * *"
  # -- Suspend the CronJob without deleting it
  suspend: false
  # -- Concurrency policy: Forbid, Replace, Allow
  concurrencyPolicy: Forbid
  # -- Number of successful job records to keep
  successfulJobsHistoryLimit: 3
  # -- Number of failed job records to keep
  failedJobsHistoryLimit: 3
  # -- Maximum retries per backup job
  backoffLimit: 1
  # -- Prefix for backup archive filenames
  archivePrefix: countly
  images:
    # -- Image used for MongoDB backup (must have mongodump)
    mongodb: docker.io/library/mongo:8.0
    # -- Image used for S3 upload (MinIO client)
    uploader: docker.io/helmforge/mc:1.0.0
  # -- Resources for backup containers
  resources: {}
  s3:
    # -- S3-compatible endpoint URL
    endpoint: ""
    # -- Target bucket name
    bucket: ""
    # -- Key prefix within the bucket
    prefix: countly
    # -- Auto-create the bucket if it does not exist
    createBucketIfNotExists: true
    # -- Use an existing secret for S3 credentials
    existingSecret: ""
    # -- Key in the existing secret for the access key
    existingSecretAccessKeyKey: access-key
    # -- Key in the existing secret for the secret key
    existingSecretSecretKeyKey: secret-key
    # -- Inline S3 access key (ignored when existingSecret is set)
    accessKey: ""
    # -- Inline S3 secret key (ignored when existingSecret is set)
    secretKey: ""
  # -- Override MongoDB credentials for backup (uses app credentials if empty)
  database:
    # -- Override MongoDB URI for backup (uses app URI if empty)
    uri: ""
    mongodumpArgs: ""

# =============================================================================
# Scheduling
# =============================================================================

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

# =============================================================================
# Extra
# =============================================================================

extraVolumes: []
extraVolumeMounts: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []

# =============================================================================
# MongoDB Subchart
# =============================================================================

mongodb:
  # -- Enable bundled MongoDB subchart
  enabled: true
  # -- MongoDB architecture
  architecture: standalone
  auth:
    # -- Enable MongoDB authentication
    enabled: true
    # -- MongoDB root username
    rootUser: root
    # -- MongoDB root password (auto-generated if empty)
    rootPassword: ""


## Gateway API configuration (GR-060)
gateway:
  enabled: false
  hostnames: []
  parentRefs: []
  #   - name: my-gateway
  #     namespace: default

## ExternalSecrets configuration (GR-061)
externalSecrets:
  enabled: false
  apiVersion: external-secrets.io/v1
  refreshInterval: "0"
  secretStoreRef:
    name: ''
    kind: ClusterSecretStore
  target:
    creationPolicy: Owner
  data: []
