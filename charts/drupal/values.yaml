# SPDX-License-Identifier: Apache-2.0
# =============================================================================
# Drupal Helm Chart
# =============================================================================
# This chart deploys Drupal using the Docker Official Image.
#
# Important:
# - Drupal upstream does not currently publish its own upstream-maintained
#   runtime container image.
# - This chart therefore uses docker.io/library/drupal.
# - The chart prepares Kubernetes resources and persistent storage, then guides
#   the user through the Drupal web installer.
#
# Persistence strategy:
# - Persist only /var/www/html/sites
# - Seed the directory from the image through an init container
# =============================================================================

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

# -- Number of Drupal replicas. Single replica is recommended unless you use shared storage for /sites.
replicaCount: 1

image:
  # -- Drupal container image repository
  repository: docker.io/library/drupal
  # -- Drupal container image tag
  tag: "11.3.9-php8.5-apache-bookworm"
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []

drupal:
  # -- Friendly site name used in docs and NOTES guidance
  siteName: Drupal
  # -- Install profile suggested in NOTES.txt
  installProfile: standard
  # -- Locale suggested in NOTES.txt
  locale: en
  # -- SQLite file path to use when database.mode=sqlite
  sqlitePath: sites/default/files/.ht.sqlite
  # -- Additional environment variables for the Drupal container
  extraEnv: []

# =============================================================================
# Database Mode
# =============================================================================
# Drupal setup is completed through the web installer. This chart therefore
# provisions the runtime and database path, then exposes the exact installer
# values in NOTES.txt.
#
# Mode detection:
# 1. database.external.host -> external
# 2. mysql.enabled -> mysql
# 3. otherwise -> sqlite
# =============================================================================

database:
  # -- Database mode: auto | external | mysql | sqlite
  mode: auto

  external:
    # -- External database hostname
    host: ""
    # -- External database port
    port: 3306
    # -- External database name
    name: drupal
    # -- External database username
    username: drupal

mysql:
  # -- Deploy MySQL as a subchart for the Drupal installer
  enabled: true
  architecture: standalone
  auth:
    # -- Database name created on first bootstrap
    database: drupal
    # -- Database username created on first bootstrap
    username: drupal
    # -- Database password (auto-generated if empty)
    password: ""
    # -- Root password (auto-generated if empty)
    rootPassword: ""
    # -- Existing secret with MySQL passwords
    existingSecret: ""
    # -- Secret key for the application user password
    existingSecretUserPasswordKey: mysql-user-password

  primary:
    persistence:
      # -- Enable persistence for MySQL data
      enabled: true
      # -- PVC size for MySQL
      size: 8Gi

# =============================================================================
# Persistent Storage
# =============================================================================

persistence:
  # -- Enable persistent storage for /var/www/html/sites
  enabled: true
  # -- Storage class (leave empty for cluster default)
  storageClass: ""
  # -- Access mode for the sites PVC
  accessMode: ReadWriteOnce
  # -- Size of the sites PVC
  size: 8Gi
  # -- Use an existing PVC instead of creating one
  existingClaim: ""
  # -- Annotations for the sites PVC
  annotations: {}

# =============================================================================
# PHP
# =============================================================================

php:
  # -- Extra php.ini content mounted into /usr/local/etc/php/conf.d/custom.ini
  ini: ""

# =============================================================================
# Service
# =============================================================================

service:
  # -- Service type
  type: ClusterIP
  # -- HTTP service port
  port: 80
  # -- Annotations for the service
  annotations: {}
  # -- IP family policy. One of: SingleStack | PreferDualStack | RequireDualStack. Omit for cluster default.
  # @default -- omitted
  # ipFamilyPolicy: PreferDualStack
  # -- Ordered list of IP families for the Service. Each entry: IPv4 | IPv6. Omit for cluster default.
  # @default -- omitted
  # ipFamilies:
  #   - IPv4
  #   - IPv6

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for Drupal
  enabled: false
  # -- Ingress class name
  ingressClassName: ""
  # -- Annotations for the ingress
  annotations: {}
  # -- Ingress hosts
  hosts: []
  # -- TLS configuration
  tls: []

# =============================================================================
# Resources and Probes
# =============================================================================

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

startupProbe:
  # -- Enable startup probe
  enabled: true
  # -- Probe path
  path: /
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

livenessProbe:
  # -- Enable liveness probe
  enabled: true
  # -- Probe path
  path: /
  initialDelaySeconds: 0
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  # -- Enable readiness probe
  enabled: true
  # -- Probe path
  path: /
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# =============================================================================
# Autoscaling and Availability
# =============================================================================

autoscaling:
  # -- Enable HorizontalPodAutoscaler. Requires MySQL-compatible database and RWX sites storage.
  enabled: false
  # -- Minimum number of replicas when autoscaling is enabled
  minReplicas: 2
  # -- Maximum number of replicas when autoscaling is enabled
  maxReplicas: 5
  # -- Target average CPU utilization percentage
  targetCPUUtilizationPercentage: 75
  # -- Target average memory utilization percentage
  targetMemoryUtilizationPercentage: 80

pdb:
  # -- Create a PodDisruptionBudget for the Drupal workload
  enabled: false
  # -- Minimum healthy pods during voluntary disruptions
  minAvailable: 1
  # -- Maximum unavailable pods during voluntary disruptions
  maxUnavailable: ""

# =============================================================================
# Backup (CronJob + S3)
# =============================================================================

backup:
  # -- Enable scheduled backups to S3-compatible storage
  enabled: false
  # -- Cron schedule for backups
  schedule: "0 3 * * *"
  # -- Suspend the CronJob without deleting it
  suspend: false
  # -- CronJob concurrency policy
  concurrencyPolicy: Forbid
  # -- Number of successful job records to keep
  successfulJobsHistoryLimit: 3
  # -- Number of failed job records to keep
  failedJobsHistoryLimit: 3
  # -- Maximum retries per backup job
  backoffLimit: 1
  # -- Prefix for generated backup archive names
  archivePrefix: drupal

  images:
    # -- Image used for mysqldump operations
    mysql: docker.io/library/mysql:8.4
    # -- Image used for consistent SQLite backup generation
    sqlite: docker.io/library/python:3.13-alpine
    # -- Image used to archive Drupal sites files
    archiver: docker.io/library/alpine:3.22
    # -- Image used to upload archives to S3-compatible storage
    uploader: docker.io/helmforge/mc:1.0.0

  # -- Resources for backup containers
  resources: {}

  s3:
    # -- S3-compatible endpoint URL
    endpoint: ""
    # -- Target bucket name
    bucket: ""
    # -- Key prefix within the bucket
    prefix: drupal
    # -- Auto-create the bucket if it does not exist
    createBucketIfNotExists: true
    # -- Use an existing secret for S3 credentials
    existingSecret: ""
    # -- Key in the existing secret for the S3 access key
    existingSecretAccessKeyKey: access-key
    # -- Key in the existing secret for the S3 secret key
    existingSecretSecretKeyKey: secret-key
    # -- Inline S3 access key when not using an existing secret
    accessKey: ""
    # -- Inline S3 secret key when not using an existing secret
    secretKey: ""

  database:
    # -- Override backup database host (defaults to the active Drupal DB host)
    host: ""
    # -- Override backup database port
    port: ""
    # -- Override backup database name
    name: ""
    # -- Override backup database username
    username: ""
    # -- Inline backup database password override
    password: ""
    # -- Existing secret with backup database password override
    existingSecret: ""
    # -- Secret key in backup.database.existingSecret for the database password
    existingSecretPasswordKey: database-password
    # -- Extra arguments passed to mysqldump
    mysqldumpArgs: "--single-transaction --quick --skip-lock-tables --no-tablespaces"

# =============================================================================
# Scheduling and Security
# =============================================================================

podSecurityContext:
  fsGroup: 33
  fsGroupChangePolicy: OnRootMismatch
securityContext: {}

serviceAccount:
  # -- Create a dedicated ServiceAccount
  create: false
  # -- Name override for the ServiceAccount
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

# =============================================================================
# Escape Hatches
# =============================================================================

extraVolumes: []
extraVolumeMounts: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []
