apiVersion: v1
kind: Service
metadata:
  name: {{ include "envoy-gateway.fullname" . }}-controller
  labels:
    {{- include "envoy-gateway.controller.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  {{- with .Values.service.ipFamilyPolicy }}
  ipFamilyPolicy: {{ . }}
  {{- end }}
  {{- with .Values.service.ipFamilies }}
  ipFamilies:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 8081
    targetPort: metrics
    protocol: TCP
  selector:
    {{- include "envoy-gateway.controller.selectorLabels" . | nindent 4 }}
---
# EG requires a Service named exactly "envoy-gateway" in the controller namespace.
# The proxy bootstrap config (generated by EG) hardcodes the xDS server address as
# envoy-gateway.<namespace>.svc.cluster.local:18000 - this service satisfies that requirement.
apiVersion: v1
kind: Service
metadata:
  name: envoy-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "envoy-gateway.controller.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  {{- with .Values.service.ipFamilyPolicy }}
  ipFamilyPolicy: {{ . }}
  {{- end }}
  {{- with .Values.service.ipFamilies }}
  ipFamilies:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  ports:
  - name: xds
    port: 18000
    targetPort: 18000
    protocol: TCP
  - name: wasm
    port: 18002
    targetPort: 18002
    protocol: TCP
  selector:
    {{- include "envoy-gateway.controller.selectorLabels" . | nindent 4 }}
