# SPDX-License-Identifier: Apache-2.0
suite: Services and HPA
templates:
  - service-controller.yaml
  - envoyproxy-config.yaml
tests:
  - it: should create 2 service documents (controller + xds)
    asserts:
      - hasDocuments:
          count: 2
        template: service-controller.yaml

  - it: should create controller service as first document
    asserts:
      - equal:
          path: kind
          value: Service
        template: service-controller.yaml
        documentIndex: 0
      - equal:
          path: spec.type
          value: ClusterIP
        template: service-controller.yaml
        documentIndex: 0
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8080
            targetPort: http
            protocol: TCP
        template: service-controller.yaml
        documentIndex: 0
      - contains:
          path: spec.ports
          content:
            name: metrics
            port: 8081
            targetPort: metrics
            protocol: TCP
        template: service-controller.yaml
        documentIndex: 0

  - it: should create xDS service named envoy-gateway as second document
    asserts:
      - equal:
          path: metadata.name
          value: envoy-gateway
        template: service-controller.yaml
        documentIndex: 1
      - contains:
          path: spec.ports
          content:
            name: xds
            port: 18000
            targetPort: 18000
            protocol: TCP
        template: service-controller.yaml
        documentIndex: 1

  - it: should apply dual-stack settings to controller services
    set:
      service:
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv4
          - IPv6
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
        template: service-controller.yaml
        documentIndex: 0
      - equal:
          path: spec.ipFamilies
          value:
            - IPv4
            - IPv6
        template: service-controller.yaml
        documentIndex: 0
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
        template: service-controller.yaml
        documentIndex: 1
      - equal:
          path: spec.ipFamilies
          value:
            - IPv4
            - IPv6
        template: service-controller.yaml
        documentIndex: 1

  - it: should configure proxy service type LoadBalancer by default in EnvoyProxy CRD
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyService.type
          value: LoadBalancer
        template: envoyproxy-config.yaml

  - it: should allow custom proxy service type via EnvoyProxy CRD
    set:
      proxy:
        service:
          type: ClusterIP
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyService.type
          value: ClusterIP
        template: envoyproxy-config.yaml

  - it: should apply proxy service annotations in EnvoyProxy CRD
    set:
      proxy:
        service:
          annotations:
            service.beta.kubernetes.io/aws-load-balancer-type: nlb
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyService.annotations["service.beta.kubernetes.io/aws-load-balancer-type"]
          value: nlb
        template: envoyproxy-config.yaml

  - it: should configure proxy EnvoyProxy ipFamily for dual-stack
    set:
      proxy:
        ipFamily: DualStack
    asserts:
      - equal:
          path: spec.ipFamily
          value: DualStack
        template: envoyproxy-config.yaml

  - it: should configure HPA in EnvoyProxy CRD when autoscaling enabled
    set:
      proxy:
        autoscaling:
          enabled: true
          minReplicas: 2
          maxReplicas: 10
          targetCPUUtilizationPercentage: 80
    asserts:
      - isNotEmpty:
          path: spec.provider.kubernetes.envoyHpa
        template: envoyproxy-config.yaml
      - equal:
          path: spec.provider.kubernetes.envoyHpa.minReplicas
          value: 2
        template: envoyproxy-config.yaml
      - equal:
          path: spec.provider.kubernetes.envoyHpa.maxReplicas
          value: 10
        template: envoyproxy-config.yaml

  - it: should not have envoyHpa when autoscaling disabled
    set:
      proxy:
        autoscaling:
          enabled: false
    asserts:
      - isNull:
          path: spec.provider.kubernetes.envoyHpa
        template: envoyproxy-config.yaml
