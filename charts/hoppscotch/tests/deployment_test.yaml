# SPDX-License-Identifier: Apache-2.0
suite: deployment tests
templates:
  - deployment.yaml
  - secret.yaml
  - configmap.yaml
tests:
  - it: should create a Deployment
    asserts:
      - hasDocuments:
          count: 1
        template: deployment.yaml
      - isKind:
          of: Deployment
        template: deployment.yaml

  - it: should use correct replicaCount
    set:
      replicaCount: 2
    asserts:
      - equal:
          path: spec.replicas
          value: 2
        template: deployment.yaml

  - it: should use pinned image tag
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "docker.io/hoppscotch/hoppscotch:2026.4.0"
        template: deployment.yaml

  - it: should have wait-for-db init container
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-db
        template: deployment.yaml
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: docker.io/library/busybox:1.37
        template: deployment.yaml

  - it: should have migrate init container
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: migrate
        template: deployment.yaml
      - matchRegex:
          path: spec.template.spec.initContainers[1].image
          pattern: "docker.io/hoppscotch/hoppscotch:2026.4.0"
        template: deployment.yaml

  - it: should prepare writable runtime files for non-root startup
    asserts:
      - equal:
          path: spec.template.spec.initContainers[2].name
          value: prepare-runtime-files
        template: deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: backend-runtime
            mountPath: /dist/backend
        template: deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: site-runtime
            mountPath: /site
        template: deployment.yaml

  - it: should build DATABASE_URL from bundled PostgreSQL user password secret
    asserts:
      - contains:
          path: spec.template.spec.initContainers[1].env
          content:
            name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-postgresql-auth
                key: user-password
        template: deployment.yaml
      - contains:
          path: spec.template.spec.initContainers[1].env
          content:
            name: DATABASE_URL
            value: postgresql://hoppscotch:$(DB_PASSWORD)@RELEASE-NAME-postgresql:5432/hoppscotch
        template: deployment.yaml

  - it: should expose stable webapp server signing key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WEBAPP_SERVER_SIGNING_KEY
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-hoppscotch
                key: webapp-server-signing-key
        template: deployment.yaml

  - it: should allow the webapp server signing key to come from an external secret
    set:
      signingKey:
        existingSecret: hoppscotch-managed-secret
        existingSecretKey: signing-key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WEBAPP_SERVER_SIGNING_KEY
            valueFrom:
              secretKeyRef:
                name: hoppscotch-managed-secret
                key: signing-key
        template: deployment.yaml

  - it: should probe the backend health endpoint
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /backend/health
        template: deployment.yaml

  - it: should run as non-root
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
        template: deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
        template: deployment.yaml

  - it: should have resources defined
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].resources.requests.cpu
        template: deployment.yaml
      - isNotNull:
          path: spec.template.spec.containers[0].resources.requests.memory
        template: deployment.yaml

  - it: should have checksum annotations
    asserts:
      - isNotNull:
          path: spec.template.metadata.annotations["checksum/config"]
        template: deployment.yaml
      - isNotNull:
          path: spec.template.metadata.annotations["checksum/secret"]
        template: deployment.yaml

  - it: should use RollingUpdate strategy by default
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate
        template: deployment.yaml

  - it: should expose port 80
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 80
            protocol: TCP
        template: deployment.yaml
