# SPDX-License-Identifier: Apache-2.0
suite: external secret tests
templates:
  - externalsecret.yaml
tests:
  - it: should render ExternalSecret data including the webapp server signing key
    set:
      externalSecrets:
        enabled: true
        secretStoreRef:
          name: example-secret-store
          kind: ClusterSecretStore
        data:
          - secretKey: database-url
            remoteRef:
              key: prod/hoppscotch
              property: database-url
          - secretKey: data-encryption-key
            remoteRef:
              key: prod/hoppscotch
              property: data-encryption-key
          - secretKey: webapp-server-signing-key
            remoteRef:
              key: prod/hoppscotch
              property: webapp-server-signing-key
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - contains:
          path: spec.data
          content:
            secretKey: webapp-server-signing-key
            remoteRef:
              key: prod/hoppscotch
              property: webapp-server-signing-key
