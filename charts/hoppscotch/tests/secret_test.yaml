# SPDX-License-Identifier: Apache-2.0
suite: secret tests
templates:
  - secret.yaml
  - configmap.yaml
tests:
  - it: should create a Secret
    asserts:
      - isKind:
          of: Secret
        template: secret.yaml

  - it: should not include database-url when using bundled PostgreSQL
    asserts:
      - notExists:
          path: data["database-url"]
        template: secret.yaml

  - it: should include database-url for chart-managed external database
    set:
      postgresql:
        enabled: false
      database:
        external:
          enabled: true
          host: postgres.example.com
          password: test-password
    asserts:
      - isNotNull:
          path: data["database-url"]
        template: secret.yaml

  - it: should include data-encryption-key
    asserts:
      - isNotNull:
          path: data["data-encryption-key"]
        template: secret.yaml

  - it: should include webapp server signing key
    asserts:
      - isNotNull:
          path: data["webapp-server-signing-key"]
        template: secret.yaml

  - it: should not include webapp server signing key when using an existing signing secret
    set:
      signingKey:
        existingSecret: hoppscotch-managed-secret
    asserts:
      - notExists:
          path: data["webapp-server-signing-key"]
        template: secret.yaml

  - it: should include GitHub OAuth keys when enabled
    set:
      auth:
        github:
          enabled: true
          clientId: test-id
          clientSecret: test-secret
    asserts:
      - isNotNull:
          path: data["github-client-id"]
        template: secret.yaml
      - isNotNull:
          path: data["github-client-secret"]
        template: secret.yaml

  - it: should not include GitHub OAuth keys when disabled
    asserts:
      - notExists:
          path: data["github-client-id"]
        template: secret.yaml

  - it: should include SMTP password when mailer custom configs enabled
    set:
      mailer:
        enabled: true
        from: test@example.com
        useCustomConfigs: true
        host: smtp.example.com
        password: test-password
    asserts:
      - isNotNull:
          path: data["smtp-password"]
        template: secret.yaml
