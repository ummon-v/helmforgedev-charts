# SPDX-License-Identifier: Apache-2.0
# =============================================================================
# Liwan Helm Chart - Default Values
# =============================================================================
# Focus: ultra-lightweight privacy-first web analytics with embedded DuckDB

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

# =============================================================================
# Image
# =============================================================================

image:
  # -- Liwan container image
  repository: ghcr.io/explodingcamera/liwan
  # -- Image tag
  tag: "1.5.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# Liwan Configuration
# =============================================================================

liwan:
  # -- Application port
  port: 9042
  # -- Public base URL of the instance
  baseUrl: ""
  # -- Extra environment variables for the container
  # -- @default -- `[]`
  extraEnv: []

# =============================================================================
# Persistence
# =============================================================================

persistence:
  # -- Enable persistence for /data (DuckDB database + GeoIP)
  enabled: true
  # -- Storage size
  size: 2Gi
  # -- Storage class
  storageClass: ""
  # -- Access modes
  accessModes:
    - ReadWriteOnce
  # -- Use an existing PVC
  existingClaim: ""

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: false
  # -- ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

# =============================================================================
# Service
# =============================================================================

service:
  # -- Service type
  type: ClusterIP
  # -- HTTP service port
  port: 80
  # -- Annotations for the Service
  annotations: {}
  # -- Service IP family policy: SingleStack | PreferDualStack | RequireDualStack. Empty uses cluster default.
  ipFamilyPolicy: ~
  # -- Service IP families override. Empty uses cluster default.
  ipFamilies: []

# =============================================================================
# Gateway API
# =============================================================================

gatewayAPI:
  # -- Enable Gateway API HTTPRoute for Liwan HTTP (requires Gateway API CRDs)
  enabled: false
  # -- Parent Gateway references. Leave empty to attach through controller defaults.
  parentRefs: []
  #   - name: shared-gateway
  #     namespace: gateway-system
  #     sectionName: https
  # -- HTTPRoute hostnames
  hostnames: []
  #   - analytics.example.com
  # -- HTTPRoute path matches
  paths:
    - type: PathPrefix
      value: /
  # -- HTTPRoute annotations
  annotations: {}

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for Liwan
  enabled: false
  # -- Ingress class name (for example: traefik, nginx)
  ingressClassName: traefik
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt
  # -- Ingress hosts
  hosts: []
    # - host: analytics.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  # -- Ingress TLS configuration
  tls: []
    # - hosts:
    #     - analytics.example.com
    #   secretName: liwan-tls

# =============================================================================
# Probes
# =============================================================================

probes:
  startup:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
  liveness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Resources and Security
# =============================================================================

resources: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

# =============================================================================
# Scheduling
# =============================================================================

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

# =============================================================================
# Extra
# =============================================================================

extraVolumes: []
extraVolumeMounts: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []
