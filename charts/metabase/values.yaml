# SPDX-License-Identifier: Apache-2.0
# =============================================================================
# Metabase Helm Chart - Default Values
# =============================================================================
# Focus: open-source BI platform with PostgreSQL metadata store

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

# =============================================================================
# Image
# =============================================================================

image:
  # -- Metabase container image
  repository: docker.io/metabase/metabase
  # -- Image tag
  tag: "v0.60.4"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# Metabase Configuration
# =============================================================================

metabase:
  # -- Application port
  port: 3000
  # -- Encryption secret key for saved credentials (auto-generated if empty)
  encryptionSecretKey: ""
  # -- Existing secret containing the encryption key
  existingSecret: ""
  # -- Key in the existing secret
  existingSecretKey: encryption-secret-key
  # -- Public site URL
  siteUrl: ""
  # -- Enable Metabase AI features. Keep disabled by default to avoid background AI jobs without a configured provider.
  aiFeaturesEnabled: false
  # -- Java timezone
  javaTimezone: UTC
  # -- JVM options for memory tuning
  javaOpts: ""
  # -- Extra environment variables for the container
  # -- @default -- `[]`
  extraEnv: []
    # - name: MB_SEND_NEW_USER_EMAILS
    #   value: "false"

# =============================================================================
# Database
# =============================================================================

database:
  # -- External PostgreSQL configuration (used when postgresql subchart is disabled)
  external:
    host: ""
    port: "5432"
    name: metabase
    username: metabase
    password: ""
    # -- Existing secret containing the database password
    existingSecret: ""
    # -- Key in the existing secret containing the password
    existingSecretPasswordKey: password

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: false
  # -- ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

# =============================================================================
# Service
# =============================================================================

service:
  # -- Service type
  type: ClusterIP
  # -- HTTP service port
  port: 80
  # -- Annotations for the Service
  annotations: {}
  # -- Service IP family policy: SingleStack | PreferDualStack | RequireDualStack. Empty uses cluster default.
  ipFamilyPolicy: ~
  # -- Service IP families override. Empty uses cluster default.
  ipFamilies: []

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for Metabase
  enabled: false
  # -- Ingress class name (for example: traefik, nginx)
  ingressClassName: traefik
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt
  # -- Ingress hosts
  hosts: []
    # - host: metabase.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  # -- Ingress TLS configuration
  tls: []
    # - hosts:
    #     - metabase.example.com
    #   secretName: metabase-tls

# =============================================================================
# Gateway API
# =============================================================================

gatewayAPI:
  # -- Enable Gateway API HTTPRoute (alternative to Ingress; requires Gateway API CRDs)
  enabled: false
  # -- Gateway name to attach the HTTPRoute to
  gatewayName: ""
  # -- Namespace of the gateway
  gatewayNamespace: ""
  # -- Hostnames the HTTPRoute matches
  hostnames: []
    # - metabase.example.com
  # -- Path prefix for the HTTPRoute
  path: /
  # -- Path match type
  pathType: PathPrefix

# Deprecated compatibility alias for gatewayAPI. Prefer gatewayAPI for new values.
gateway:
  # -- Enable Gateway API HTTPRoute (alternative to Ingress; requires Gateway API CRDs)
  enabled: false
  # -- Gateway name to attach the HTTPRoute to
  gatewayName: ""
  # -- Namespace of the gateway
  gatewayNamespace: ""
  # -- Hostnames the HTTPRoute matches
  hostnames: []
    # - metabase.example.com
  # -- Path prefix for the HTTPRoute
  path: /
  # -- Path match type
  pathType: PathPrefix

# =============================================================================
# Probes
# =============================================================================

probes:
  startup:
    enabled: true
    path: /api/health
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  liveness:
    enabled: true
    path: /api/health
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    path: /api/health
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Resources and Security
# =============================================================================

resources: {}

podSecurityContext: {}

securityContext: {}

# =============================================================================
# S3 Backup
# =============================================================================

backup:
  # -- Enable scheduled PostgreSQL backups to S3-compatible storage
  enabled: false
  # -- Cron schedule for backups (default: daily at 03:00 UTC)
  schedule: "0 3 * * *"
  # -- Suspend the CronJob without deleting it
  suspend: false
  # -- Concurrency policy: Forbid, Replace, Allow
  concurrencyPolicy: Forbid
  # -- Number of successful job records to keep
  successfulJobsHistoryLimit: 3
  # -- Number of failed job records to keep
  failedJobsHistoryLimit: 3
  # -- Maximum retries per backup job
  backoffLimit: 1
  # -- Prefix for backup archive filenames
  archivePrefix: metabase
  images:
    # -- Image used for PostgreSQL backup (must have pg_dump)
    postgresql: docker.io/library/postgres:18-alpine
    # -- Image used for S3 upload (MinIO client)
    uploader: docker.io/helmforge/mc:1.0.0
  # -- Resources for backup containers
  resources: {}
  s3:
    # -- S3-compatible endpoint URL
    endpoint: ""
    # -- Target bucket name
    bucket: ""
    # -- Key prefix within the bucket
    prefix: metabase
    # -- Auto-create the bucket if it does not exist
    createBucketIfNotExists: true
    # -- Use an existing secret for S3 credentials
    existingSecret: ""
    # -- Key in the existing secret for the access key
    existingSecretAccessKeyKey: access-key
    # -- Key in the existing secret for the secret key
    existingSecretSecretKeyKey: secret-key
    # -- Inline S3 access key (ignored when existingSecret is set)
    accessKey: ""
    # -- Inline S3 secret key (ignored when existingSecret is set)
    secretKey: ""
  # -- Override database credentials for backup (uses app credentials if empty)
  database:
    host: ""
    port: ""
    name: ""
    username: ""
    password: ""
    existingSecret: ""
    existingSecretPasswordKey: password
    postgresDumpArgs: ""

# =============================================================================
# Scheduling
# =============================================================================

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

# =============================================================================
# Extra
# =============================================================================

extraVolumes: []
extraVolumeMounts: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []

# =============================================================================
# External Secrets Operator
# =============================================================================

externalSecrets:
  # -- Render ExternalSecret for clusters running External Secrets Operator.
  # Requires metabase.existingSecret to be set to prevent credential drift.
  enabled: false
  # -- ExternalSecret apiVersion.
  apiVersion: external-secrets.io/v1
  # -- Refresh interval.
  refreshInterval: "0"
  secretStoreRef:
    # -- Existing SecretStore or ClusterSecretStore name.
    name: ""
    kind: SecretStore
  target:
    creationPolicy: Owner
  # -- ExternalSecret data entries mapping remote keys to the app Secret keys.
  data: []
  #   - secretKey: encryption-secret-key
  #     remoteRef:
  #       key: metabase/credentials
  #       property: encryption-secret-key

# =============================================================================
# Subcharts
# =============================================================================

postgresql:
  # -- Deploy PostgreSQL as a subchart
  enabled: true
  architecture: standalone
  auth:
    database: metabase
    username: metabase
    # -- PostgreSQL password (auto-generated if empty)
    password: ""
  initdb:
    scripts:
      02-extensions.sql: |
        CREATE EXTENSION IF NOT EXISTS citext;
