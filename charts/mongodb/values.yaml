# SPDX-License-Identifier: Apache-2.0
# =============================================================================
# MongoDB Helm Chart - Default Values
# =============================================================================
# Supports: standalone | replicaset | sharded
# Uses the official MongoDB Docker image (https://hub.docker.com/_/mongo)

# -- Architecture: standalone | replicaset | sharded
architecture: standalone

# -- Override release name
nameOverride: ""
fullnameOverride: ""

# -- Labels added to all resources
commonLabels: {}

# =============================================================================
# Image
# =============================================================================

image:
  repository: docker.io/library/mongo
  tag: "8.3.1"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# Authentication
# =============================================================================

auth:
  # -- Enable authentication (--auth flag)
  enabled: true
  # -- Root username (MONGO_INITDB_ROOT_USERNAME)
  rootUser: root
  # -- Root password (MONGO_INITDB_ROOT_PASSWORD). Auto-generated if empty.
  rootPassword: ""
  # -- Use an existing secret for root credentials
  # Keys: mongodb-root-username, mongodb-root-password
  existingSecret: ""
  # -- Replica set keyFile for internal member authentication
  # Auto-generated if empty and architecture=replicaset|sharded
  replicaSetKey: ""
  # -- Existing secret containing the keyFile (key: mongodb-replica-set-key)
  existingKeySecret: ""
  # -- Additional users to create on first startup.
  # Each entry creates a user with readWrite access to its database.
  # The database is also created automatically.
  users: []
    # - username: appuser
    #   password: apppass
    #   database: mydb
    #   roles:
    #     - { role: readWrite, db: mydb }

# =============================================================================
# Replica Set
# =============================================================================

replicaSet:
  # -- Replica set name
  name: rs0
  # -- Number of data-bearing members (architecture=replicaset)
  members: 3

# =============================================================================
# Sharded Cluster (architecture=sharded)
# =============================================================================

sharded:
  mongos:
    # -- Number of mongos routers
    replicaCount: 2
    # -- Resources for mongos
    resources: {}
    # -- Port for mongos
    port: 27017

  configServer:
    # -- Number of config server members
    replicaCount: 3
    # -- Resources for config servers
    resources: {}
    persistence:
      size: 8Gi
      storageClass: ""

  shards:
    # -- Number of shards
    count: 2
    # -- Members per shard replica set
    membersPerShard: 3
    # -- Resources for shard members
    resources: {}
    persistence:
      size: 16Gi
      storageClass: ""

# =============================================================================
# Persistence
# =============================================================================

persistence:
  # -- Enable persistent storage (StatefulSet volumeClaimTemplate)
  enabled: true
  # -- Storage class (empty = cluster default)
  storageClass: ""
  # -- Access mode
  accessMode: ReadWriteOnce
  # -- Volume size
  size: 8Gi
  # -- Use an existing PVC (standalone only)
  existingClaim: ""

# =============================================================================
# Mongod Configuration
# =============================================================================

# -- Custom mongod.conf content (mounted as ConfigMap)
# If empty, a sensible default is generated based on architecture
config: {}
  # storage:
  #   wiredTiger:
  #     engineConfig:
  #       cacheSizeGB: 1
  # operationProfiling:
  #   mode: slowOp
  #   slowOpThresholdMs: 100

# -- Port mongod listens on
port: 27017

# =============================================================================
# Init Scripts
# =============================================================================

# -- Scripts executed on first startup via /docker-entrypoint-initdb.d/
# Supports .sh and .js files. Runs against MONGO_INITDB_DATABASE.
initdbScripts: {}
  # 01-create-user.js: |
  #   db.createUser({
  #     user: "appuser",
  #     pwd: "apppass",
  #     roles: [{ role: "readWrite", db: "mydb" }]
  #   });
  # 02-seed-data.sh: |
  #   #!/bin/bash
  #   mongoimport --db mydb --collection items --file /data/seed.json

# -- Name of an existing ConfigMap with init scripts
initdbScriptsConfigMap: ""

# -- Database for init scripts (MONGO_INITDB_DATABASE)
initdbDatabase: ""

# =============================================================================
# Resources
# =============================================================================

resources: {}
  # limits:
  #   cpu: "1"
  #   memory: 2Gi
  # requests:
  #   cpu: 250m
  #   memory: 512Mi

# =============================================================================
# Security Context
# =============================================================================

podSecurityContext:
  fsGroup: 999

securityContext: {}
  # runAsUser: 999
  # runAsNonRoot: true
  # allowPrivilegeEscalation: false
  # readOnlyRootFilesystem: false

# =============================================================================
# Service
# =============================================================================

service:
  # -- Service type: ClusterIP, NodePort, LoadBalancer
  type: ClusterIP
  port: 27017
  # -- Annotations on the client service
  annotations: {}
  # -- NodePort (only if type=NodePort)
  nodePort: ""
  # -- Service IP family policy: SingleStack | PreferDualStack | RequireDualStack. Empty uses cluster default.
  ipFamilyPolicy: ""
  # -- Service IP families override. Empty uses cluster default.
  ipFamilies: []

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  create: false
  name: ""
  annotations: {}

# =============================================================================
# Probes
# =============================================================================

livenessProbe:
  exec:
    command:
      - mongosh
      - --eval
      - "db.adminCommand('ping')"
  initialDelaySeconds: 30
  periodSeconds: 20
  timeoutSeconds: 10
  failureThreshold: 6

readinessProbe:
  exec:
    command:
      - mongosh
      - --eval
      - "db.adminCommand('ping')"
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  exec:
    command:
      - mongosh
      - --eval
      - "db.adminCommand('ping')"
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

# =============================================================================
# Metrics (Prometheus Exporter)
# =============================================================================

metrics:
  # -- Deploy a mongodb-exporter sidecar
  enabled: false
  image:
    repository: docker.io/percona/mongodb_exporter
    tag: "0.49.0"
    pullPolicy: IfNotPresent
  port: 9216
  # -- Extra args for the exporter
  extraArgs: []
  resources: {}

  serviceMonitor:
    # -- Create a ServiceMonitor resource (requires Prometheus Operator)
    enabled: false
    interval: 30s
    labels: {}

# =============================================================================
# Backup
# =============================================================================

backup:
  # -- Enable built-in backup CronJob support
  enabled: false
  # -- Backup schedule in Cron format
  schedule: "0 3 * * *"
  # -- Suspend backup execution
  suspend: false
  # -- CronJob concurrency policy
  concurrencyPolicy: Forbid
  # -- Successful job history retained by the CronJob
  successfulJobsHistoryLimit: 3
  # -- Failed job history retained by the CronJob
  failedJobsHistoryLimit: 3
  # -- Job backoff limit
  backoffLimit: 1
  # -- Prefix used in generated backup archive names
  archivePrefix: mongodb
  # -- Resources applied to the backup dump and upload containers
  resources: {}
  images:
    uploader:
      repository: docker.io/helmforge/mc
      tag: "1.0.0"
      pullPolicy: IfNotPresent
    mongodb:
      repository: docker.io/library/mongo
      tag: "8.3.1"
      pullPolicy: IfNotPresent
  s3:
    # -- S3-compatible endpoint URL, for example: https://s3.amazonaws.com or https://minio.example.com
    endpoint: ""
    # -- Target bucket name
    bucket: ""
    # -- Optional key prefix inside the bucket
    prefix: mongodb
    # -- Create the bucket automatically when it does not exist yet
    createBucketIfNotExists: true
    # -- Existing secret containing access-key and secret-key
    existingSecret: ""
    # -- Secret key name for the access key inside backup.s3.existingSecret
    existingSecretAccessKeyKey: access-key
    # -- Secret key name for the secret key inside backup.s3.existingSecret
    existingSecretSecretKeyKey: secret-key
    # -- Inline access key used when backup.s3.existingSecret is not set
    accessKey: ""
    # -- Inline secret key used when backup.s3.existingSecret is not set
    secretKey: ""
  database:
    # -- Extra arguments passed to mongodump
    mongoDumpArgs: ""

# =============================================================================
# Scheduling
# =============================================================================

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 60

podLabels: {}
podAnnotations: {}
annotations: {}

# =============================================================================
# Extra
# =============================================================================

# -- Extra environment variables
extraEnv: []
  # - name: MONGO_EXTRA_FLAG
  #   value: "true"

# -- Extra volume mounts on the mongod container
extraVolumeMounts: []
# -- Extra volumes on the pod
extraVolumes: []

# -- Arbitrary extra manifests (supports tpl)
extraManifests: []



# =============================================================================
# External Secrets Operator
# =============================================================================

externalSecrets:
  # -- Render ExternalSecret for clusters running External Secrets Operator.
  enabled: false
  # -- ExternalSecret apiVersion.
  apiVersion: external-secrets.io/v1
  # -- Refresh interval.
  refreshInterval: 1h
  secretStoreRef:
    # -- Existing SecretStore or ClusterSecretStore name.
    name: ""
    kind: SecretStore
  target:
    creationPolicy: Owner
  # -- ExternalSecret data entries for MongoDB root credentials and S3 backup.
  data: []
  #   - secretKey: mongodb-root-password
  #     remoteRef:
  #       key: mongodb/credentials
  #       property: root-password
