# SPDX-License-Identifier: Apache-2.0
apiVersion: v2
name: n8n
description: n8n workflow automation platform with SQLite, PostgreSQL, or MySQL and optional Redis queue mode
type: application
version: 1.5.6
appVersion: "2.19.2"
kubeVersion: ">=1.26.0-0"
maintainers:
  - name: helmforgedev
  - name: mberlofa
keywords:
  - n8n
  - workflow
  - automation
  - integration
  - low-code
home: https://helmforge.dev
sources:
  - https://github.com/helmforgedev/charts/tree/main/charts/n8n
  - https://github.com/n8n-io/n8n
icon: https://helmforge.dev/icons/charts/n8n.png
annotations:
  artifacthub.io/changes: |
    - kind: changed
      description: "upgrade n8n to 2.19.2 (#212)"
    - kind: changed
      description: "refresh PostgreSQL, MySQL, and Redis subchart dependencies (#212)"
    - kind: changed
      description: "upgrade to 2.19.0 (#181)"
  artifacthub.io/maintainers: |
    - name: HelmForge
      email: berlofa@helmforge.dev
    - name: Maicon Berlofa
      email: maicon.berloffa@gmail.com
  helmforge.dev/maturity: stable
  helmforge.dev/signed: gpg+cosign
  artifacthub.io/signKey: |
    fingerprint: 6748042FBAD8C2E11C65E564170D55148EB88A9D
    url: https://repo.helmforge.dev/pgp-public-key.asc
  helmforge.dev/repository: https://repo.helmforge.dev
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: integration-delivery
  artifacthub.io/links: |
    - name: Official Website
      url: https://n8n.io
    - name: Documentation
      url: https://helmforge.dev/docs/charts/n8n
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/n8n
    - name: support
      url: https://github.com/helmforgedev/charts/issues
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/helmforge/postgresql
    - url: https://artifacthub.io/packages/helm/helmforge/redis
dependencies:
  - name: postgresql
    version: 1.10.0
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
  - name: mysql
    version: 1.9.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: mysql.enabled
  - name: redis
    version: 1.6.14
    repository: oci://ghcr.io/helmforgedev/helm
    condition: redis.enabled
