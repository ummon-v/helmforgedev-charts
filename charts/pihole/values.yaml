# SPDX-License-Identifier: Apache-2.0
# =============================================================================
# Pi-hole DNS Sinkhole Helm Chart
# =============================================================================
# Uses pihole/pihole - the official Pi-hole container image.
# Provides network-wide ad blocking via DNS filtering.
# https://docs.pi-hole.net/
# =============================================================================

# -- Override the chart name used in resource names
nameOverride: ""

# -- Override the full release name used in resource names
fullnameOverride: ""

# -- Labels added to every resource created by this chart
commonLabels: {}

# =============================================================================
# Image
# =============================================================================

image:
  # -- Container image repository
  repository: docker.io/pihole/pihole
  # -- Container image tag
  tag: "2026.05.0"
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []

# =============================================================================
# Pi-hole Configuration
# =============================================================================

pihole:
  # -- Timezone for logs and scheduled tasks
  timezone: UTC

  # -- Upstream DNS servers (semicolon-delimited)
  # Examples: "8.8.8.8;8.8.4.4", "1.1.1.1;1.0.0.1"
  # When unbound sidecar is enabled, this is overridden to "127.0.0.1#5335"
  upstreamDns: "8.8.8.8;8.8.4.4"

  # -- DNS listening mode: LOCAL, ALL, SINGLE, BIND
  # Set to ALL when using Kubernetes services
  listeningMode: ALL

  # -- Enable DNSSEC validation
  dnssec: false

  # -- FTL advanced configuration
  ftl:
    # -- DNS cache size (default: 10000)
    cacheSize: 10000
    # -- Privacy level: 0=show all, 1=hide domains, 2=hide domains+clients, 3=anonymous
    privacyLevel: 0
    # -- Block CNAME-cloaked trackers (default: true)
    cnameInspection: true
    # -- Rate limiting query count per client; set to 0 to disable rate limiting
    rateLimit: 1000
    # -- Rate limiting interval in seconds
    rateLimitInterval: 60
    # -- Block AAAA queries on A-only networks (default: false)
    blockAAAA: false
    # -- Query logging (default: true)
    queryLogging: true
    # -- Use database for queries (required for long-term stats)
    useDatabase: true

  # -- Additional environment variables for the Pi-hole container
  # extraEnv:
  #   - name: FTLCONF_custom_option
  #     value: "value"
  extraEnv: []

# =============================================================================
# Web Admin
# =============================================================================

admin:
  # -- Web admin password (auto-generated if empty and no existingSecret)
  password: ""

  # -- Use an existing secret for the admin password
  existingSecret: ""

  # -- Key in the existing secret that contains the admin password
  existingSecretKey: password

# =============================================================================
# DNS Records & Blocklists
# =============================================================================

dns:
  # -- Blocklist preset: none, basic, balanced, aggressive, gaming-friendly
  # - none: No preset lists (use custom adlists only)
  # - basic: StevenBlack hosts (~170k domains)
  # - balanced: StevenBlack + Hagezi Multi NORMAL (~970k domains)
  # - aggressive: StevenBlack + Hagezi Multi PRO + Threat Intelligence (~2.6M domains)
  # - gaming-friendly: Balanced + Gaming platform whitelists (Xbox, PS, Nintendo)
  preset: "none"

  # -- Custom blocklist URLs (added to preset)
  # adlists:
  #   - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
  #   - https://s3.amazonaws.com/lists.disconnect.me/simple_tracking.txt
  adlists: []

  # -- Automatic whitelist presets for common services
  whitelistPresets:
    # -- Whitelist Microsoft services (Windows Update, Office 365, etc)
    microsoft: false
    # -- Whitelist Apple services (iCloud, App Store, iMessage, etc)
    apple: false
    # -- Whitelist Google services (YouTube, Play Store, etc)
    google: false
    # -- Whitelist gaming platforms (Xbox Live, PSN, Nintendo, Steam)
    gaming: false
    # -- Whitelist smart home devices (Alexa, Google Home, etc)
    smartHome: false

  # -- Manual whitelisted domains (added to presets)
  whitelist: []

  # -- Blacklisted domains (exact matches)
  blacklist: []

  # -- Regex filters for blocking (advanced)
  # regex:
  #   - "^ad[sxv]?[0-9]*\\..*"
  #   - ".*\\.(click|top|tk|ml)$"
  regex: []

  # -- Conditional forwarding for local domains
  conditionalForwarding:
    # -- Enable conditional forwarding
    enabled: false
    # -- Local network domain (e.g., "home.local", "lan")
    domain: ""
    # -- Local network CIDR (e.g., "192.168.1.0/24")
    network: ""
    # -- Router/DNS server IP for reverse lookups
    router: ""
    # -- Additional conditional forwarding rules
    # customRules:
    #   - domain: "corp.example.com"
    #     server: "10.0.0.1"
    customRules: []

  # -- Custom local DNS A records
  # Each entry: "IP HOSTNAME"
  # customRecords:
  #   - "192.168.1.10 nas.local"
  #   - "192.168.1.20 printer.local"
  customRecords: []

  # -- Custom CNAME records (dnsmasq format)
  # cnameRecords:
  #   - "cname=alias.local,target.local"
  cnameRecords: []

  # -- Custom dnsmasq configuration lines
  # customDnsmasq:
  #   - "server=/corp.example.com/10.0.0.1"
  #   - "address=/blocked.example.com/0.0.0.0"
  customDnsmasq: []

# =============================================================================
# Persistence
# =============================================================================

persistence:
  # -- Enable persistent storage for /etc/pihole
  enabled: true

  # -- Storage class (leave empty for cluster default)
  storageClass: ""

  # -- Access mode for the PVC
  accessMode: ReadWriteOnce

  # -- Size of the persistent volume
  size: 1Gi

  # -- Use an existing PVC instead of creating one
  existingClaim: ""

  # -- Annotations for the PVC
  annotations: {}

# =============================================================================
# Gravity Database Initialization
# =============================================================================
# Init container that populates gravity.db with adlists, whitelist, blacklist,
# and regex before Pi-hole starts. This enables automation of blocklist management.
# =============================================================================

gravity:
  # -- Enable automated gravity database initialization
  enabled: true

  # -- Run pihole -g after populating database (updates gravity)
  updateOnInit: true

  image:
    # -- Init container image repository
    repository: docker.io/library/alpine
    # -- Init container image tag
    tag: "3.23"
    # -- Init container pull policy
    pullPolicy: IfNotPresent

  # -- Resources for the init container
  resources: {}
    # requests:
    #   cpu: 50m
    #   memory: 64Mi
    # limits:
    #   cpu: 200m
    #   memory: 128Mi

  # -- Resources for the gravity update init container
  updateResources: {}
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
    # limits:
    #   cpu: 500m
    #   memory: 512Mi

# =============================================================================
# Backup Automation
# =============================================================================
# Automated S3 backups of Pi-hole configuration and gravity database.
# =============================================================================

backup:
  # -- Enable automated backups to S3
  enabled: false

  # -- Backup schedule (cron format)
  schedule: "0 3 * * *"  # Daily at 3 AM UTC

  # -- Job backoff limit
  backoffLimit: 1

  # -- Job history limits
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

  # -- Concurrency policy (Forbid, Allow, Replace)
  concurrencyPolicy: Forbid

  # -- What to backup
  include:
    # -- Backup gravity database (blocklists, whitelist, blacklist, regex, groups)
    gravity: true
    # -- Backup custom DNS records
    customDns: true
    # -- Backup dnsmasq configuration
    dnsmasq: true

  images:
    # -- Backup utility image (tar + gzip)
    utility:
      repository: docker.io/library/alpine
      tag: "3.23"
      pullPolicy: IfNotPresent
    # -- S3 uploader image (MinIO client)
    uploader:
      repository: docker.io/helmforge/mc
      tag: "1.0.0"
      pullPolicy: IfNotPresent

  # -- Resources for backup containers
  resources: {}
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
    # limits:
    #   cpu: 500m
    #   memory: 256Mi

  s3:
    # -- S3-compatible endpoint URL
    endpoint: ""

    # -- Target bucket name
    bucket: ""

    # -- Key prefix within the bucket
    prefix: "pihole"

    # -- Use an existing secret for S3 credentials
    # Keys: access-key, secret-key
    existingSecret: ""

    # -- S3 access key ID
    accessKey: ""

    # -- S3 secret access key
    secretKey: ""

# =============================================================================
# Resources
# =============================================================================

# -- CPU and memory requests/limits for the Pi-hole container
resources: {}
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  # limits:
  #   cpu: 500m
  #   memory: 512Mi

# =============================================================================
# Pod Networking
# =============================================================================

# -- Use the host network for the main Pi-hole pod
hostNetwork: false

# -- Pod DNS policy. Defaults to ClusterFirstWithHostNet when hostNetwork is enabled
dnsPolicy: ""

# =============================================================================
# Security Context
# =============================================================================

podSecurityContext: {}

securityContext:
  # -- Linux capabilities required by Pi-hole
  capabilities:
    add:
      - NET_BIND_SERVICE
      - NET_RAW
      - SYS_NICE
      - CHOWN

# =============================================================================
# Probes
# =============================================================================

startupProbe:
  # -- Enable startup probe
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

livenessProbe:
  # -- Enable liveness probe
  enabled: true
  initialDelaySeconds: 0
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  # -- Enable readiness probe
  enabled: true
  initialDelaySeconds: 0
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# =============================================================================
# DNS Service
# =============================================================================

serviceDns:
  # -- Service type for DNS
  type: LoadBalancer

  # -- DNS port
  port: 53

  # -- Annotations for the DNS service
  annotations: {}

  # -- External traffic policy (set to Local for client IP preservation)
  # externalTrafficPolicy: Local

  # -- Load balancer IP (set a fixed IP for DNS stability)
  # loadBalancerIP: "192.168.1.53"

  # -- Service IP family policy: SingleStack | PreferDualStack | RequireDualStack. Empty uses cluster default.
  ipFamilyPolicy: ~
  # -- Service IP families override. Empty uses cluster default.
  ipFamilies: []

# =============================================================================
# Web Service
# =============================================================================

serviceWeb:
  # -- Service type for web admin
  type: ClusterIP

  # -- Web admin HTTP port
  port: 80

  # -- Annotations for the web service
  annotations: {}

  # -- Service IP family policy: SingleStack | PreferDualStack | RequireDualStack. Empty uses cluster default.
  ipFamilyPolicy: ~
  # -- Service IP families override. Empty uses cluster default.
  ipFamilies: []

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for the web admin interface
  enabled: false

  # -- Ingress class name
  # ingressClassName: traefik
  ingressClassName: ""

  # -- Ingress annotations
  # annotations:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  annotations: {}

  # -- Ingress hosts
  # hosts:
  #   - host: pihole.example.com
  #     paths:
  #       - path: /
  #         pathType: Prefix
  hosts: []

  # -- Ingress TLS configuration
  # tls:
  #   - secretName: pihole-tls
  #     hosts:
  #       - pihole.example.com
  tls: []

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a dedicated ServiceAccount
  create: false

  # -- Name override (auto-generated if empty)
  name: ""

  # -- Annotations for the ServiceAccount
  annotations: {}

# =============================================================================
# Metrics (pihole-exporter)
# =============================================================================

metrics:
  # -- Enable Prometheus metrics via pihole-exporter sidecar
  enabled: false

  image:
    # -- pihole-exporter image repository
    repository: docker.io/ekofr/pihole-exporter
    # -- pihole-exporter image tag
    tag: v1.2.0
    # -- pihole-exporter pull policy
    pullPolicy: IfNotPresent

  # -- Port for the Prometheus metrics endpoint
  port: 9617

  # -- ServiceMonitor for Prometheus Operator
  serviceMonitor:
    # -- Create a ServiceMonitor resource
    enabled: false
    # -- Scrape interval
    interval: 30s
    # -- Additional labels for the ServiceMonitor
    labels: {}

# =============================================================================
# Unbound Sidecar (Recursive DNS)
# =============================================================================
# Unbound performs full recursive DNS resolution, querying root nameservers
# directly. This eliminates dependency on third-party DNS providers.
# When enabled, Pi-hole upstream DNS is automatically set to 127.0.0.1#5335.
# =============================================================================

unbound:
  # -- Enable Unbound sidecar for recursive DNS resolution
  enabled: false

  image:
    # -- Unbound image repository
    repository: docker.io/mvance/unbound
    # -- Unbound image tag
    tag: 1.22.0
    # -- Unbound pull policy
    pullPolicy: IfNotPresent

  # -- Unbound listening port inside the pod
  port: 5335

  # -- Full unbound.conf override (string). When empty, the chart renders a
  # default config that binds to 127.0.0.1 on unbound.port, enables DNSSEC
  # validation against the trust anchor the image generates at
  # /opt/unbound/etc/unbound/var/root.key, and protects RFC1918 ranges from
  # rebinding. Set this to replace the file at
  # /opt/unbound/etc/unbound/unbound.conf entirely; paths referenced inside
  # must match the layout of the mvance/unbound image (no root.hints ships
  # with it).
  config: ""

  # -- Extra unbound directives appended inside the default server: section.
  # Ignored when unbound.config is set.
  # extraConfig: |
  #   forward-zone:
  #       name: "."
  #       forward-tls-upstream: yes
  #       forward-addr: 1.1.1.1@853
  extraConfig: ""

  # -- Resources for the Unbound sidecar
  resources: {}
    # requests:
    #   cpu: 50m
    #   memory: 64Mi
    # limits:
    #   cpu: 200m
    #   memory: 128Mi

# =============================================================================
# DHCP (Advanced)
# =============================================================================
# DHCP requires hostNetwork or special network configuration.
# Not recommended in most Kubernetes environments.
# =============================================================================

dhcp:
  # -- Enable DHCP server
  enabled: false

  # -- Use host network for DHCP broadcasts
  hostNetwork: false

# =============================================================================
# Scheduling
# =============================================================================

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- Topology spread constraints
topologySpreadConstraints: []

# -- Priority class name
priorityClassName: ""

# -- Grace period for shutdown (seconds)
terminationGracePeriodSeconds: 30

# =============================================================================
# Pod-Level Metadata
# =============================================================================

# -- Additional labels for the pod
podLabels: {}

# -- Additional annotations for the pod
podAnnotations: {}

# =============================================================================
# Extra
# =============================================================================

# -- Additional volume mounts for the Pi-hole container
extraVolumeMounts: []

# -- Additional volumes for the pod
extraVolumes: []

# -- Extra Kubernetes manifests to deploy alongside the chart
extraManifests: []

# =============================================================================
# Gateway API
# =============================================================================

gateway:
  # -- Enable Gateway API HTTPRoute (alternative to Ingress; requires Gateway API CRDs)
  enabled: false
  # -- Annotations for the HTTPRoute
  annotations: {}
  # -- parentRefs pointing to your Gateway resource
  parentRefs: []
  # -- Hostnames the HTTPRoute matches
  hostnames: []
  # -- Path prefix
  path: /
  # -- Path match type
  pathType: PathPrefix

# =============================================================================
# External Secrets Operator
# =============================================================================

externalSecrets:
  # -- Render ExternalSecret for the Pi-hole admin password secret.
  # Requires admin.existingSecret to be set to prevent drift between
  # the chart-managed admin Secret and the ExternalSecret.
  enabled: false
  apiVersion: external-secrets.io/v1
  refreshInterval: "0"
  secretStoreRef:
    name: ""
    kind: SecretStore
  target:
    creationPolicy: Owner
  # -- Data entries mapping remote keys to the Pi-hole admin password.
  data: []
  #   - secretKey: password
  #     remoteRef:
  #       key: pihole/admin
  #       property: password

# =============================================================================
# Configuration Examples
# =============================================================================
# Uncomment and adjust the relevant example below for quick setup
# =============================================================================

# Example 1: Home network with balanced blocking and monitoring
# --------------------------------------------------------------
# dns:
#   preset: "balanced"
#   whitelistPresets:
#     microsoft: true
#     apple: true
#     gaming: true
#   conditionalForwarding:
#     enabled: true
#     domain: "home.local"
#     network: "192.168.1.0/24"
#     router: "192.168.1.1"
# metrics:
#   enabled: true
#   serviceMonitor:
#     enabled: true
# serviceDns:
#   type: LoadBalancer
#   loadBalancerIP: "192.168.1.53"

# Example 2: Aggressive blocking for restricted network (kids/office)
# --------------------------------------------------------------------
# dns:
#   preset: "aggressive"
#   blacklist:
#     - "tiktok.com"
#     - "snapchat.com"
#     - "instagram.com"
#   whitelistPresets:
#     microsoft: true  # For school/work devices
#     google: false
# pihole:
#   ftl:
#     queryLogging: true
#     privacyLevel: 1

# Example 3: Privacy-first setup with recursive DNS (no third-party DNS)
# -----------------------------------------------------------------------
# dns:
#   preset: "balanced"
# unbound:
#   enabled: true
# pihole:
#   dnssec: true
#   ftl:
#     privacyLevel: 2
#     cnameInspection: true
# backup:
#   enabled: true
#   s3:
#     endpoint: "https://s3.amazonaws.com"
#     bucket: "my-pihole-backups"
#     existingSecret: "pihole-s3-creds"

# Example 4: Gaming-optimized setup
# ----------------------------------
# dns:
#   preset: "gaming-friendly"
#   whitelistPresets:
#     gaming: true
#     microsoft: true  # For Xbox
# pihole:
#   upstreamDns: "1.1.1.1;1.0.0.1"  # Cloudflare (low latency)
#   ftl:
#     cacheSize: 20000
#     rateLimit: 2000
#     rateLimitInterval: 60
