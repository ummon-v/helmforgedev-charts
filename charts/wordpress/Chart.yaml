apiVersion: v2
name: wordpress
type: application
version: 1.4.7
appVersion: "6.9.4"
kubeVersion: ">=1.26.0-0"
description: A Helm chart for deploying WordPress on Kubernetes with MySQL support and S3 backup
maintainers:
  - name: helmforgedev
  - name: mberlofa
keywords:
  - wordpress
  - cms
  - blog
  - php
  - mysql
home: https://helmforge.dev/docs/charts/wordpress
sources:
  - https://github.com/helmforgedev/charts
  - https://hub.docker.com/_/wordpress
icon: https://helmforge.dev/icons/charts/wordpress.png
annotations:
  artifacthub.io/changes: |
    - kind: fixed
      description: update minio mc image to helmforge/mc:1.0.0 (#57)
  artifacthub.io/maintainers: |
    - name: HelmForge
      email: berlofa@helmforge.dev
    - name: Maicon Berlofa
      email: maicon.berloffa@gmail.com
  helmforge.dev/maturity: stable
  helmforge.dev/signed: gpg+cosign
  artifacthub.io/signKey: |
    fingerprint: 6748042FBAD8C2E11C65E564170D55148EB88A9D
    url: https://repo.helmforge.dev/pgp-public-key.asc
  helmforge.dev/repository: https://repo.helmforge.dev
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: integration-delivery
  artifacthub.io/links: |
    - name: Official Website
      url: https://wordpress.org
    - name: Documentation
      url: https://helmforge.dev/docs/charts/wordpress
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/wordpress
    - name: support
      url: https://github.com/helmforgedev/charts/issues
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/helmforge/mysql
dependencies:
  - name: mysql
    version: 2.0.0
    repository: oci://ghcr.io/helmforgedev/helm
    condition: mysql.enabled
  - name: redis
    version: 1.6.14
    repository: oci://ghcr.io/helmforgedev/helm
    condition: objectCache.redis.subchart.enabled
