# SPDX-License-Identifier: Apache-2.0
suite: Deployment
templates:
  - templates/deployment.yaml
  - templates/configmap.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Deployment by default
    template: templates/deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-wordpress

  - it: should use Recreate strategy
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: should set replicas to 1
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should omit replicas when autoscaling is enabled
    template: templates/deployment.yaml
    set:
      autoscaling.enabled: true
    asserts:
      - isNull:
          path: spec.replicas

  - it: should disable service account token automount by default
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false

  - it: should use default image tag with appVersion
    template: templates/deployment.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "wordpress:.*-apache"

  - it: should set WORDPRESS_DB_HOST env var
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WORDPRESS_DB_HOST
            value: "test-mysql:3306"

  - it: should set WORDPRESS_DB_NAME env var
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WORDPRESS_DB_NAME
            value: "wordpress"

  - it: should set WORDPRESS_DB_USER env var
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WORDPRESS_DB_USER
            value: "wordpress"

  - it: should set WORDPRESS_DB_PASSWORD from secret
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WORDPRESS_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: test-mysql-auth
                key: mysql-user-password

  - it: should set table prefix
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WORDPRESS_TABLE_PREFIX
            value: "wp_"

  - it: should enable debug mode when configured
    template: templates/deployment.yaml
    set:
      wordpress.debug: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WORDPRESS_DEBUG
            value: "1"

  - it: should not set debug by default
    template: templates/deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: WORDPRESS_DEBUG
            value: "1"

  - it: should set config extra when configured
    template: templates/deployment.yaml
    set:
      wordpress.configExtra: "define('WP_MEMORY_LIMIT', '256M');"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[5].name
          value: WORDPRESS_CONFIG_EXTRA
      - matchRegex:
          path: spec.template.spec.containers[0].env[5].value
          pattern: "WP_MEMORY_LIMIT"

  - it: should generate structured wp-config options
    template: templates/deployment.yaml
    set:
      wordpress.forceSSLAdmin: true
      wordpress.disallowFileEdit: true
      wordpress.disableWpCron: true
      wordpress.memoryLimit: 256M
      wordpress.maxMemoryLimit: 512M
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].env[5].value
          pattern: "FORCE_SSL_ADMIN"
      - matchRegex:
          path: spec.template.spec.containers[0].env[5].value
          pattern: "DISALLOW_FILE_EDIT"
      - matchRegex:
          path: spec.template.spec.containers[0].env[5].value
          pattern: "DISABLE_WP_CRON"

  - it: should configure Redis object cache env and wp-config constants
    template: templates/deployment.yaml
    set:
      plugins.enabled: true
      plugins.installer.enabled: true
      objectCache.enabled: true
      objectCache.redis.subchart.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WP_REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: test-redis-auth
                key: redis-password
      - matchRegex:
          path: spec.template.spec.containers[0].env[6].value
          pattern: "WP_REDIS_HOST"
      - matchRegex:
          path: spec.template.spec.containers[0].env[6].value
          pattern: "test-redis-client"

  - it: should use Redis subchart existingSecret for object cache password
    template: templates/deployment.yaml
    set:
      plugins.enabled: true
      plugins.installer.enabled: true
      objectCache.enabled: true
      objectCache.redis.subchart.enabled: true
      redis.auth.existingSecret: wordpress-redis-auth
      redis.auth.existingSecretPasswordKey: redis-password
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WP_REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: wordpress-redis-auth
                key: redis-password

  - it: should not set Redis password when subchart auth is disabled
    template: templates/deployment.yaml
    set:
      plugins.enabled: true
      plugins.installer.enabled: true
      objectCache.enabled: true
      objectCache.redis.subchart.enabled: true
      redis.auth.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: WP_REDIS_PASSWORD
      - matchRegex:
          path: spec.template.spec.containers[0].env[5].value
          pattern: "WP_REDIS_HOST"
      - notMatchRegex:
          path: spec.template.spec.containers[0].env[5].value
          pattern: "WP_REDIS_PASSWORD"

  - it: should include extra env vars
    template: templates/deployment.yaml
    set:
      wordpress.extraEnv:
        - name: PHP_MEMORY_LIMIT
          value: "256M"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PHP_MEMORY_LIMIT
            value: "256M"

  - it: should include extra envFrom sources
    template: templates/deployment.yaml
    set:
      wordpress.extraEnvFrom:
        - secretRef:
            name: wordpress-extra-env
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: wordpress-extra-env

  - it: should append extra init containers
    template: templates/deployment.yaml
    set:
      extraInitContainers:
        - name: prepare-content
          image: busybox:1.37
          command: ["sh", "-c", "true"]
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: prepare-content

  - it: should append extra containers
    template: templates/deployment.yaml
    set:
      extraContainers:
        - name: sidecar
          image: busybox:1.37
          command: ["sh", "-c", "sleep 3600"]
    asserts:
      - equal:
          path: spec.template.spec.containers[1].name
          value: sidecar

  - it: should expose HTTP port
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 80
            protocol: TCP

  - it: should include wait-for-db init container
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-db
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: "docker.io/library/busybox:1.37"

  - it: should render startup probe when enabled
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /wp-admin/install.php

  - it: should not render startup probe when disabled
    template: templates/deployment.yaml
    set:
      startupProbe.enabled: false
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].startupProbe

  - it: should render liveness probe
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /wp-login.php

  - it: should render readiness probe
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /wp-login.php

  - it: should mount wordpress-data volume
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: wordpress-data
            mountPath: /var/www/html

  - it: should use PVC by default
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: wordpress-data
            persistentVolumeClaim:
              claimName: test-wordpress

  - it: should use emptyDir when persistence disabled
    template: templates/deployment.yaml
    set:
      persistence.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: wordpress-data
            emptyDir: {}

  - it: should mount php.ini when configured
    template: templates/deployment.yaml
    set:
      php.ini: |
        upload_max_filesize = 64M
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: php-config
            mountPath: /usr/local/etc/php/conf.d/custom.ini
            subPath: custom.ini
            readOnly: true

  - it: should set resources when configured
    template: templates/deployment.yaml
    set:
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 250m

  - it: should render metrics sidecar when enabled
    template: templates/deployment.yaml
    set:
      metrics.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[1].name
          value: metrics
      - equal:
          path: spec.template.spec.containers[1].image
          value: "docker.io/lusotycoon/apache-exporter:v1.0.8"

  - it: should not render metrics sidecar by default
    template: templates/deployment.yaml
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1

  - it: should use external DB host when configured
    template: templates/deployment.yaml
    set:
      mysql.enabled: false
      database.external.host: db.example.com
      database.external.password: secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WORDPRESS_DB_HOST
            value: "db.example.com:3306"

  - it: should set node selector
    template: templates/deployment.yaml
    set:
      nodeSelector:
        kubernetes.io/os: linux
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            kubernetes.io/os: linux

  - it: should set terminationGracePeriodSeconds
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 30

  - it: should set pod labels
    template: templates/deployment.yaml
    set:
      podLabels:
        custom: value
    asserts:
      - equal:
          path: spec.template.metadata.labels.custom
          value: value

  - it: should set pod annotations
    template: templates/deployment.yaml
    set:
      podAnnotations:
        custom: value
    asserts:
      - equal:
          path: spec.template.metadata.annotations.custom
          value: value
